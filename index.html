<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barry KDP – Webinar Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&display=swap" rel="stylesheet">
<script src="./supabase.js"></script>
<style>
  :root { color-scheme: dark; }
  .viz-root {
    color-scheme: dark;
    /* Dark · Neon-Grün (Closify-inspiriert) */
    --page:           #0A100E;
    --surface-1:      #101A16;
    --text-primary:   #F2F7F4;
    --text-secondary: #BCCFC5;
    --text-muted:     #7E948A;
    --grid:           #1D2A24;
    --baseline:       #2A3B33;
    --border:         rgba(242,247,244,0.08);
    --series-1:       #27A862;
    --series-2:       #4C8FE0;
    --petrol:         #4ADE80;   /* Neon-Grün Akzent */
    --petrol-soft:    #86EFAC;
    --petrol-deep:    #16A34A;
    --teal-deep:      #0F2C21;
    --mint:           #34D399;
    --cyan:           #38BDF8;
    --delta-good:     #4ADE80;
    --delta-bad:      #F87171;
    --bar-dim:        #22322B;
    --hover:          rgba(242,247,244,0.05);
    --glass-bg:       rgba(255,255,255,0.06);
    --glass-border:   rgba(74,222,128,0.22);
    --glass-shadow:   0 16px 40px -16px rgba(0,0,0,0.6), 0 0 32px -12px rgba(74,222,128,0.25);
    --glow-1:         rgba(74,222,128,0.14);
    --glow-2:         rgba(52,211,153,0.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Manrope', system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page); color: var(--text-primary);
    font-size: 14px; min-height: 100vh;
    transition: background .25s, color .25s;
  }
  button, input { font-family: inherit; }
  .accent { font-family: 'Fraunces', Georgia, serif; font-style: italic; font-weight: 500; color: var(--petrol); }
  .eyebrow { font-size: 10.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--petrol); }
  .backdrop { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(720px 480px at 85% 5%,  var(--glow-1), transparent 70%),
      radial-gradient(640px 460px at 8% 95%,  var(--glow-2), transparent 70%),
      radial-gradient(900px 600px at 50% 45%, rgba(74,222,128,0.05), transparent 72%);
  }
  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
  .fade { animation: fadeUp .45s ease both; }

  /* toggles (Sprache + Theme) */
  .toggles { display:flex; gap:8px; align-items:center; }
  .lang {
    display:inline-flex; border:1px solid var(--border); border-radius:999px;
    background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); overflow:hidden;
  }
  .lang button {
    padding: 6px 12px; border:none; background:transparent; cursor:pointer;
    font-size: 11.5px; font-weight: 800; letter-spacing:.06em; color: var(--text-muted);
  }
  .lang button.active { background: var(--text-primary); color: var(--page); }
  .thm {
    width: 32px; height: 32px; border:1px solid var(--border); border-radius:999px;
    background: var(--surface-1); cursor:pointer; font-size: 14px; color: var(--text-secondary);
    display:inline-flex; align-items:center; justify-content:center;
  }
  .thm:hover { color: var(--text-primary); }

  /* ================= LOGIN ================= */
  #login { position: fixed; inset: 0; z-index: 60; display:flex; align-items:center; justify-content:center; padding: 20px; }
  .login-shell {
    background: rgba(16,26,22,0.55);
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.10); border-radius: 18px;
    display:grid; grid-template-columns: 1fr 1fr;
    width: 980px; max-width: 100%; overflow: hidden;
    box-shadow: 0 24px 70px -20px rgba(36,29,21,.25);
    position: relative; z-index: 1;
  }
  .login-toggles { position:absolute; top: 16px; right: 16px; z-index: 5; }
  .login-form { padding: 56px 52px; display:flex; flex-direction:column; justify-content:center; }
  .lockup { display:flex; align-items:center; gap: 11px; }
  .lockup .mark {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--petrol), var(--petrol-soft));
    color: #05130C; font-weight: 800; font-size: 16px;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 6px 16px -6px rgba(74,222,128,.5);
  }
  .lockup .lt b { display:block; font-size: 14.5px; font-weight: 800; letter-spacing:-.01em; }
  .lockup .lt span { display:block; font-size: 8.5px; font-weight: 700; letter-spacing: .22em; color: var(--text-muted); margin-top: 1px; }
  .login-form .lockup { margin-bottom: 38px; }
  .login-form h1 { font-size: 27px; font-weight: 800; letter-spacing: -.02em; text-align:center; margin-bottom: 6px; }
  .login-form .sub { font-size: 13px; color: var(--text-muted); text-align:center; margin-bottom: 30px; }
  .login-form label { font-size: 12.5px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; display:block; }
  .login-form label span { color: var(--petrol-deep); }
  .inputwrap { position: relative; margin-bottom: 16px; }
  .inputwrap input {
    width: 100%; padding: 12px 14px 12px 40px;
    border: 1px solid var(--baseline); border-radius: 9px;
    background: var(--page); color: var(--text-primary); font-size: 14px;
  }
  .inputwrap input:focus { outline: 2px solid var(--petrol); outline-offset: -1px; }
  .inputwrap .ic { position:absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
  .msg { display:none; margin: 0 0 16px; padding: 10px 14px; border-radius: 9px; font-size: 12.5px; font-weight: 600; }
  .msg.err  { background: rgba(160,60,0,.08);  border: 1px solid rgba(160,60,0,.25);  color: var(--delta-bad); }
  .msg.ok   { background: rgba(14,124,91,.08); border: 1px solid rgba(14,124,91,.25); color: var(--delta-good); }
  .login-row { display:flex; justify-content:flex-end; align-items:center; font-size: 12.5px; margin: 2px 0 22px; }
  .login-row a { color: var(--text-primary); text-decoration: none; font-weight: 700; cursor: pointer; }
  .login-row a:hover { color: var(--petrol); }
  .btn-primary {
    width: 100%; padding: 15px; border:none; border-radius: 999px;
    background: linear-gradient(135deg, var(--petrol), var(--petrol-soft));
    color: #05130C; font-size: 12.5px; font-weight: 800;
    letter-spacing: .1em; text-transform: uppercase; cursor:pointer;
    box-shadow: 0 12px 28px -10px rgba(74,222,128,.55);
    transition: transform .15s, filter .15s;
  }
  .btn-primary:hover { filter: brightness(1.04); transform: translateY(-1px); }
  .btn-primary:disabled { opacity:.6; cursor: wait; transform:none; }
  .btn-ghost {
    width: 100%; padding: 12px; margin-top: 10px; border: 1px solid var(--baseline); border-radius: 999px;
    background: transparent; color: var(--text-secondary); font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  .btn-ghost:hover { background: var(--hover); color: var(--text-primary); }
  .login-form .hint { font-size: 11.5px; color: var(--text-muted); margin-top: 22px; text-align:center; line-height: 1.55; }
  .login-promo {
    position: relative; overflow: hidden;
    background:
      radial-gradient(420px 300px at 80% 12%, var(--glow-1), transparent 70%),
      radial-gradient(380px 280px at 15% 85%, var(--glow-2), transparent 70%),
      var(--page);
    border-left: 1px solid var(--border);
    padding: 48px 44px; display:flex; flex-direction:column; justify-content:center; gap: 26px;
  }
  .promo-mock {
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border); border-radius: 14px;
    padding: 18px; box-shadow: var(--glass-shadow);
  }
  .promo-mock .mrow { display:flex; gap: 10px; margin-bottom: 12px; }
  .promo-mock .mcard { flex:1; border:1px solid var(--glass-border); background: var(--glass-bg); border-radius: 9px; padding: 10px 12px; }
  .promo-mock .mcard .l { font-size: 9px; font-weight: 700; letter-spacing:.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
  .promo-mock .mcard .v { font-size: 17px; font-weight: 800; }
  .promo-mock .mcard .d { font-size: 10px; font-weight: 700; color: var(--delta-good); margin-top: 2px; }
  .promo-bars { display:flex; align-items:flex-end; gap: 6px; height: 56px; padding: 0 4px; }
  .promo-bars i { flex: 1; background: var(--bar-dim); border-radius: 3px 3px 0 0; display:block; }
  .promo-bars i.hl { background: linear-gradient(180deg, var(--petrol-soft), var(--petrol)); }
  .promo-quote { font-size: 17px; line-height: 1.55; color: var(--text-secondary); }
  .promo-quote b { color: var(--text-primary); font-weight: 800; }
  .promo-who { display:flex; align-items:center; gap: 10px; font-size: 12.5px; color: var(--text-muted); }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex: none;
    background: linear-gradient(135deg, var(--petrol), var(--petrol-soft));
    color:#05130C; font-size: 12px; font-weight: 800;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .promo-who b { color: var(--text-primary); display:block; font-size: 13px; font-weight: 800; }
  @media (max-width: 880px) { .login-shell { grid-template-columns: 1fr; } .login-promo { display:none; } }

  /* ================= APP SHELL ================= */
  #app { display: none; position: relative; z-index: 1; }
  .shell { display: grid; grid-template-columns: 252px 1fr; min-height: 100vh; }
  aside {
    background: rgba(255,255,255,0.035);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 20px 14px; display:flex; flex-direction:column; gap: 4px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  aside .lockup { padding: 2px 8px 18px; }
  .side-search {
    display:flex; align-items:center; gap: 8px;
    border: 1px solid var(--border); border-radius: 9px;
    padding: 8px 12px; color: var(--text-muted); font-size: 13px; margin-bottom: 14px;
    background: var(--page);
  }
  .side-search kbd { margin-left:auto; font-size: 10px; border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; color: var(--text-muted); font-family: inherit; }
  .side-sec { font-size: 10px; letter-spacing: .16em; font-weight: 700; color: var(--text-muted); text-transform: uppercase; padding: 12px 8px 6px; }
  .nav-item {
    display:flex; align-items:center; gap: 10px; width: 100%;
    padding: 10px 11px; border-radius: 9px; border:none; background: transparent;
    color: var(--text-secondary); font-size: 13.5px; font-weight: 600; cursor: pointer; text-align: left;
  }
  .nav-item .nic { width: 18px; text-align:center; opacity:.85; }
  .nav-item:hover { background: var(--hover); color: var(--text-primary); }
  .nav-item.active { background: var(--text-primary); color: var(--page); font-weight: 800; }
  .nav-item .soon { margin-left: auto; font-size: 9.5px; font-weight: 700; letter-spacing:.06em; color: var(--text-muted); border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; }
  .side-bottom { margin-top: auto; }
  .side-user { display:flex; align-items:center; gap: 10px; padding: 10px; border: 1px solid var(--border); border-radius: 14px; margin-top: 10px; }
  .side-user .nm { font-size: 13px; font-weight: 800; }
  .side-user .em { font-size: 11px; color: var(--text-muted); word-break: break-all; }
  .side-user .logout { margin-left:auto; flex:none; border: 1px solid var(--border); background: transparent; border-radius: 8px; padding: 5px 9px; font-size: 10.5px; font-weight: 700; color: var(--text-muted); cursor: pointer; letter-spacing:.04em; }
  .side-user .logout:hover { color: var(--delta-bad); border-color: var(--delta-bad); }

  main { padding: 0 28px 48px; min-width: 0; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
  .crumbs { font-size: 13px; color: var(--text-muted); }
  .crumbs b { color: var(--text-primary); font-weight: 700; }
  .greet { display:flex; align-items:flex-end; justify-content:space-between; gap: 16px; margin-bottom: 22px; flex-wrap:wrap; }
  .greet h1 { font-size: 25px; font-weight: 800; letter-spacing: -.02em; }
  .greet p { font-size: 13.5px; color: var(--text-muted); margin-top: 5px; }
  .greet p .accent { font-size: 14.5px; }
  .chip { display:inline-flex; align-items:center; gap: 8px; border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 999px; padding: 8px 16px; font-size: 12.5px; font-weight: 600; color: var(--text-secondary); }

  .card {
    background: rgba(255,255,255,0.045);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.09); border-radius: 18px; padding: 20px 22px;
    box-shadow: 0 16px 40px -20px rgba(0,0,0,0.5);
    transition: transform .2s, box-shadow .2s;
  }
  .card h2 { font-size: 15px; font-weight: 800; letter-spacing:-.01em; display:flex; align-items:center; gap: 8px; }
  .card .cardhead { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .card .cardhead .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .card .eyebrow { display:block; margin-bottom: 5px; }

  .kpis { display:grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; margin-bottom: 16px; }
  .tile {
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border); border-radius: 14px;
    box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-border);
    padding: 16px 18px;
    transition: transform .2s;
  }
  .tile:hover { transform: translateY(-2px); }
  .tile .label { font-size: 11px; font-weight: 700; letter-spacing:.1em; text-transform: uppercase; color: var(--text-muted); display:flex; align-items:center; margin-bottom: 10px; }
  .tile .row { display:flex; align-items:center; justify-content:space-between; gap: 10px; }
  .tile .value { font-size: 27px; font-weight: 800; letter-spacing: -0.02em; white-space: nowrap; }
  .tile .delta { font-size: 12px; margin-top: 8px; font-weight: 700; }
  .delta.up { color: var(--delta-good); }
  .delta.down { color: var(--delta-bad); }
  .info {
    display:inline-flex; align-items:center; justify-content:center;
    width: 16px; height: 16px; border-radius: 50%;
    border: 1px solid var(--baseline); color: var(--text-muted);
    font-size: 10px; font-style: normal; font-weight:700;
    cursor: help; margin-left: auto; flex:none; letter-spacing: 0; text-transform: none;
  }

  .grid-main { display:grid; grid-template-columns: minmax(0, 1.9fr) minmax(280px, 1fr); gap: 14px; margin-bottom: 16px; }
  @media (max-width: 980px) { .grid-main { grid-template-columns: 1fr; } .shell { grid-template-columns: 1fr; } aside { position: static; height:auto; } }

  .bigchart { position: relative; height: 260px; margin-top: 8px; }
  .gridlines { position:absolute; inset: 0 0 26px 34px; }
  .gridlines i { position:absolute; left:0; right:0; height:1px; background: var(--grid); }
  .gridlines label { position:absolute; left:-34px; width: 28px; text-align:right; font-size: 11px; color: var(--text-muted); transform: translateY(-50%); }
  .bars { position:absolute; inset: 0 0 26px 34px; display:flex; align-items:flex-end; gap: 10px; padding: 0 6px; }
  .bcol { flex:1; display:flex; align-items:flex-end; height: 100%; position: relative; cursor: default; }
  .bcol i { display:block; width: 100%; max-width: 34px; margin: 0 auto; background: var(--bar-dim); border-radius: 4px 4px 0 0; transition: height .6s cubic-bezier(.2,.7,.3,1), background .15s; }
  .bcol:hover i { background: var(--baseline); filter: brightness(.96); }
  .bcol.hl i { background: linear-gradient(180deg, var(--petrol-soft), var(--petrol)); box-shadow: 0 10px 24px -10px rgba(74,222,128,.5); }
  .bcol.hl:hover i { filter: none; }
  .xlab { position:absolute; inset: auto 0 0 34px; display:flex; gap: 10px; padding: 0 6px; }
  .xlab span { flex:1; text-align:center; font-size: 11px; color: var(--text-muted); }
  .hline { position:absolute; left: 34px; right: 0; border-top: 1.5px dashed var(--baseline); opacity:0; transition: opacity .3s .5s; }
  .hbadge { position:absolute; transform: translate(-50%, -130%); background: var(--text-primary); color: var(--page); font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px; white-space: nowrap; opacity:0; transition: opacity .3s; }

  .feed-tabs { display:flex; border:1px solid var(--border); border-radius: 999px; overflow:hidden; margin-bottom: 14px; }
  .feed-tabs button { flex:1; padding: 8px 4px; font-size: 12px; font-weight: 700; border:none; background:transparent; color: var(--text-muted); cursor:pointer; }
  .feed-tabs button.active { background: var(--text-primary); color: var(--page); }
  .feed-count { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
  .fitem { display:flex; gap: 12px; padding: 10px 0; border-top: 1px solid var(--grid); }
  .fitem:first-child { border-top:none; }
  .fic { width: 30px; height: 30px; border-radius: 9px; flex:none; border: 1px solid var(--border); background: var(--page); display:flex; align-items:center; justify-content:center; font-size: 13px; }
  .fitem .ft { font-size: 13px; font-weight: 700; }
  .fitem .fs { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .fitem .tm { margin-left:auto; font-size: 11px; color: var(--text-muted); flex:none; }

  .tbl-search { display:flex; align-items:center; gap:8px; border:1px solid var(--border); border-radius: 999px; padding: 7px 14px; font-size: 12.5px; color: var(--text-muted); background: var(--page); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
  th { color: var(--text-muted); font-weight: 700; font-size: 11px; letter-spacing:.08em; text-transform: uppercase; }
  td.r, th.r { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:hover td { background: var(--hover); }
  .who { display:flex; align-items:center; gap: 9px; font-weight: 600; }
  .badge { display:inline-flex; align-items:center; gap: 6px; font-size: 12px; font-weight: 600; padding: 3px 11px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-secondary); background: var(--page); }
  .badge .b-dot { width: 7px; height: 7px; border-radius: 50%; }

  .seg { display:inline-flex; border:1px solid rgba(255,255,255,0.10); border-radius: 999px; background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); overflow:hidden; margin-bottom: 18px; }
  .seg button { padding: 10px 20px; font-size: 13px; font-weight: 700; border:none; background:transparent; color: var(--text-secondary); cursor:pointer; }
  .seg button.active { background: var(--text-primary); color: var(--page); font-weight:800; }
  .legend { display:flex; gap:18px; font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:16px; }
  .legend .key { display:flex; align-items:center; gap:7px; }
  .legend .sw { width:11px; height:11px; border-radius:3px; }
  .stage { padding: 14px 0 12px; border-top: 1px solid var(--grid); }
  .stage:first-child { border-top:none; padding-top: 2px; }
  .stage b.sname { font-size: 14px; font-weight: 800; }
  .stage .stage-desc { font-size: 12px; color: var(--text-muted); margin: 3px 0 9px; }
  .barrow { display:flex; align-items:center; gap:12px; margin-bottom:5px; }
  .bartrack { flex:1; height: 24px; position:relative; }
  .fbar { height: 24px; border-radius: 0 4px 4px 0; position:absolute; left:0; top:0; min-width: 3px; cursor: default; transition: width .6s cubic-bezier(.2,.7,.3,1), opacity .15s; }
  .fbar:hover { opacity:.85; }
  .barrow .num { width: 190px; font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
  .barrow .num b { color: var(--text-primary); font-variant-numeric: tabular-nums; font-weight: 800; }
  td.better { color: var(--delta-good); font-weight: 800; }

  .ctabar {
    margin-top: 16px; border-radius: 18px; padding: 22px 26px;
    background: rgba(74,222,128,0.08); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); color: #F2F7F4; border: 1px solid rgba(74,222,128,0.28);
    display:flex; align-items:center; justify-content:space-between; gap: 16px; flex-wrap: wrap;
  }
  .ctabar b { font-size: 15px; font-weight: 800; display:block; }
  .ctabar span { font-size: 12.5px; opacity:.8; }
  .ctabar button {
    border:none; border-radius: 999px; padding: 12px 22px; cursor:pointer;
    background: linear-gradient(135deg, var(--petrol), var(--petrol-soft));
    color: #05130C; font-size: 11.5px; font-weight: 800; letter-spacing:.1em; text-transform: uppercase;
    box-shadow: 0 10px 26px -10px rgba(74,222,128,.55);
  }

  #tooltip {
    position: fixed; z-index: 99; pointer-events: none;

/* ================= Theme ================= */
function applyTheme(t){
  if (t) document.documentElement.dataset.theme = t;
  else delete document.documentElement.dataset.theme;
  const icon = (document.documentElement.dataset.theme === 'dark') ? '☀' : '☽';
  const b1 = document.getElementById('thm'), b2 = document.getElementById('thm-l');
  if (b1) b1.innerHTML = icon; if (b2) b2.innerHTML = icon;
}
function toggleTheme(){
  const cur = document.documentElement.dataset.theme;
  const next = cur === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  try { localStorage.setItem('barry-theme', next); } catch(e) {}
  if (loggedIn) renderAll();
}
/* Dark-only: kein Theme-Toggle */

/* ================= Toast ================= */
let toastTimer = null;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ================= Login-Panels ================= */
function showPanel(which){
  ['login','forgot','newpw'].forEach(p => {
    document.getElementById('panel-' + p).style.display = p === which ? 'block' : 'none';
  });
  document.querySelectorAll('.msg').forEach(m => m.style.display = 'none');
  if (which === 'forgot') {
    document.getElementById('mail2').value = document.getElementById('mail').value;
  }
}

/* ================= Auth ================= */
async function init(){
  translate();
  const { data: { session } } = await sb.auth.getSession();
  if (session) await enterApp();
}
sb.auth.onAuthStateChange((event) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('login').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    showPanel('newpw');
  }
});
async function doLogin(){
  const t = T();
  const btn = document.getElementById('loginbtn');
  const err = document.getElementById('loginerr');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = t.signingIn;
  const { error } = await sb.auth.signInWithPassword({
    email: document.getElementById('mail').value.trim(),
    password: document.getElementById('pw').value,
  });
  if (error) {
    err.textContent = t.loginErr; err.style.display = 'block';
    btn.disabled = false; btn.textContent = t.signIn;
    return;
  }
  await enterApp();
  btn.disabled = false; btn.textContent = t.signIn;
}
async function doForgot(){
  const t = T();
  const btn = document.getElementById('forgotbtn');
  const err = document.getElementById('forgoterr');
  const ok  = document.getElementById('forgotok');
  err.style.display = 'none'; ok.style.display = 'none';
  const email = document.getElementById('mail2').value.trim();
  if (!email) { err.textContent = t.forgotErr; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = t.sending;
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + window.location.pathname,
  });
  btn.disabled = false; btn.textContent = t.sendLink;
  if (error) { err.textContent = t.forgotErr; err.style.display = 'block'; return; }
  ok.textContent = t.forgotOk; ok.style.display = 'block';
}
async function doNewPassword(){
  const t = T();
  const btn = document.getElementById('newpwbtn');
  const err = document.getElementById('newpwerr');
  err.style.display = 'none';
  const p1 = document.getElementById('npw1').value, p2 = document.getElementById('npw2').value;
  if (p1.length < 8) { err.textContent = t.pwShort; err.style.display = 'block'; return; }
  if (p1 !== p2) { err.textContent = t.pwMismatch; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = t.saving;
  const { error } = await sb.auth.updateUser({ password: p1 });
  btn.disabled = false; btn.textContent = t.saveSignIn;
  if (error) { err.textContent = error.message; err.style.display = 'block'; return; }
  toast(t.pwUpdated);
  await enterApp();
}
async function doLogout(){ await sb.auth.signOut(); location.reload(); }
document.getElementById('pw').addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
document.getElementById('mail2').addEventListener('keydown', e => { if(e.key === 'Enter') doForgot(); });
document.getElementById('npw2').addEventListener('keydown', e => { if(e.key === 'Enter') doNewPassword(); });

async function enterApp(){
  const [wRes, eRes, uRes] = await Promise.all([
    sb.from('webinars').select('*').order('id'),
    sb.from('events').select('*').order('ts', { ascending: false }).limit(200),
    sb.auth.getUser(),
  ]);
  if (wRes.error || !wRes.data || wRes.data.length < 2) {
    const err = document.getElementById('loginerr');
    err.textContent = T().dataErr; err.style.display = 'block';
    showPanel('login');
    return;
  }
  W1 = wRes.data[0]; W2 = wRes.data[1];
  TS2 = W2.reg_timeline || [];
  EVENTS = eRes.data || [];

  const email = (uRes.data && uRes.data.user && uRes.data.user.email) || 'team';
  const name = email.split('@')[0];
  document.getElementById('user-ini').textContent = name.slice(0,2).toUpperCase();
  document.getElementById('user-name').textContent = name.charAt(0).toUpperCase() + name.slice(1);
  document.getElementById('user-mail').textContent = email;
  window._userName = name.charAt(0).toUpperCase() + name.slice(1);
  window._userEmail = email;

  loggedIn = true;
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  translate();
  renderAll();
}
function fmtDate(d){ const x = new Date(d); return x.toLocaleDateString(LOC()); }
function fmtTs(ts){
  const d = new Date(ts), now = new Date();
  const hm = d.toLocaleTimeString(LOC(), {hour:'2-digit', minute:'2-digit'});
  return d.toDateString() === now.toDateString() ? `${T().today}, ${hm}` : `${d.toLocaleDateString(LOC(),{day:'2-digit',month:'2-digit'})}, ${hm}`;
}

    { label:t.kpiShow, value: pctS(W2.show, W2.regs), d: dpct(pct(W2.show,W2.regs), pct(W1.show,W1.regs)), spark:[40,42,41,44,43,46,45,47,48,47,49,50], tip:t.tipShow(fmt(W2.show), fmt(W2.regs)) },
    { label:t.kpiCoaching, value: fmt(W2.coaching), d: dpct(W2.coaching, W1.coaching), spark:[10,12,11,14,15,14,17,18,20,22,24,26], tip:t.tipCoaching },
    { label:t.kpiRevenue, value: fmtE(W2.revenue), d: dpct(W2.revenue, W1.revenue), spark:[55,60,58,66,72,70,79,86,92,101,118,145], tip:t.tipRevenue },
  ];

    return `<div class="tile">
      <div class="label">${k.label}<i class="info" data-tip="${k.tip.replace(/"/g,'&quot;')}">i</i></div>
      <div class="row"><span class="value">${k.value}</span>${spark(k.spark, up)}</div>
      <div class="delta ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(k.d).toLocaleString(LOC(),{maximumFractionDigits:1})} % ${t.vs} ${W1.name}</div>
    </div>`;
  }).join('');
  attachTips();
}
function spark(data, good){
  const w = 76, h = 30, max = Math.max(...data), min = Math.min(...data);
  const x = i => 2 + (w-4) * i / (data.length-1);
  const y = v => 2 + (h-4) * (1 - (v - min) / ((max - min) || 1));
  const pts = data.map((v,i) => `${x(i)},${y(v)}`).join(' ');
  const col = good ? css('--delta-good') : css('--delta-bad');
  return `<svg width="${w}" height="${h}" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity=".9"/>
  </svg>`;
}

function bigchart(){
  const t = T();
  const el = document.getElementById('bigchart');
  if (!TS2.length) { el.innerHTML = ''; return; }
  const n = TS2.length;
  const maxY = Math.max(10, Math.ceil(Math.max(...TS2) / 10) * 10);
  const hiIdx = TS2.indexOf(Math.max(...TS2));
  let grid = '';
  for (let g = 0; g <= maxY; g += 10) {
    const top = (1 - g/maxY) * 100;
    grid += `<i style="top:${top}%"></i><label style="top:${top}%">${g}</label>`;
  }
  const bars = TS2.map((v,i) => {
    const day = i - (n - 1);
    const lab = day === 0 ? t.webinarDay : t.daysBefore(Math.abs(day));
    return `<div class="bcol ${i===hiIdx?'hl':''}" data-tip="<b>${lab}</b><br><b>${v}</b> ${t.regs}">
      <i style="height:0%" data-h="${100*v/maxY}"></i>
    </div>`;
  }).join('');
  const xlab = TS2.map((v,i) => {
    const day = i - (n - 1);
    return `<span>${(i%2===1) ? (day===0 ? t.dayZero : day) : ''}</span>`;
  }).join('');
  el.innerHTML = `
    <div class="gridlines">${grid}</div>
    <div class="bars">${bars}</div>
    <div class="hline"></div>
    <div class="xlab">${xlab}</div>`;
  requestAnimationFrame(() => {
    el.querySelectorAll('.bcol i').forEach(b => b.style.height = b.dataset.h + '%');
    setTimeout(() => {
      const chart = el.getBoundingClientRect();
      const hlEl = el.querySelector('.bcol.hl i');
      if (!hlEl) return;
      const hl = hlEl.getBoundingClientRect();
      const line = el.querySelector('.hline');
      line.style.top = (hl.top - chart.top) + 'px';
      line.style.opacity = 1;
      const badge = document.createElement('div');
      badge.className = 'hbadge';
      const day = hiIdx - (n - 1);
      badge.textContent = `${day === 0 ? t.dayZero : t.day + ' ' + day} · ${TS2[hiIdx]}`;
      badge.style.left = (hl.left - chart.left + hl.width/2) + 'px';
      badge.style.top = (hl.top - chart.top) + 'px';
      el.appendChild(badge);
      requestAnimationFrame(() => badge.style.opacity = 1);
    }, 620);
  });
  attachTips();
}

/* ================= Funnel ================= */
function funnel(){
  const t = T();
  const el = document.getElementById('funnel');
  const legend = document.getElementById('funnel-legend');
  const title = document.getElementById('funnel-title');
  const max = Math.max(W1.typeform, W2.typeform);
  const series = view === 'w1' ? [[W1.name, W1, '--series-1']]
               : view === 'w2' ? [[W2.name, W2, '--series-2']]
               : [[W1.name, W1, '--series-1'], [W2.name, W2, '--series-2']];
  legend.style.display = series.length > 1 ? 'flex' : 'none';
  document.getElementById('leg1').textContent = W1.name + (W1.event_date ? ` (${fmtDate(W1.event_date)})` : '');
  document.getElementById('leg2').textContent = W2.name + (W2.event_date ? ` (${fmtDate(W2.event_date)})` : '');
  title.textContent = series.length > 1 ? t.funnelTitle : t.funnelTitleOne(series[0][0]);

  el.innerHTML = STAGE_KEYS.map((key, i) => {
    const pair = t.stages[key];
    const sname = pair[0], sdesc = pair[1];
    const rows = series.map(s => {
      const name = s[0], D = s[1], col = s[2];
      const v = D[key];
      const prev = i > 0 ? D[STAGE_KEYS[i-1]] : null;
      const convPrev = prev ? pctS(v, prev) : '–';
      const convStart = pctS(v, D[STAGE_KEYS[0]]);
      const w = Math.max(0.6, 100 * v / max);
      const numTxt = i > 0 ? `<b>${fmt(v)}</b> · ${convPrev} ${t.ofPrev}` : `<b>${fmt(v)}</b> ${t.persons}`;
      return `<div class="barrow">
        <div class="bartrack">
          <div class="fbar" style="width:0%" data-w="${w}" data-col="${col}"
            data-tip="<b>${name} · ${sname}</b><br>${fmt(v)} ${t.persons}${prev ? `<br>${convPrev} ${t.ofPrevLong} (${fmt(prev)})` : ''}<br>${convStart} ${t.ofAll}"></div>
        </div>
        <div class="num">${numTxt}</div>
      </div>`;
    }).join('');
    return `<div class="stage">
      <b class="sname">${i+1}. ${sname}</b>
      <div class="stage-desc">${sdesc}</div>
      ${rows}
    </div>`;
  }).join('');
  requestAnimationFrame(() => {
    el.querySelectorAll('.fbar').forEach(b => {
      b.style.background = `var(${b.dataset.col})`;
      b.style.width = b.dataset.w + '%';
    });
  });
  attachTips();
}
function table(){
  const t = T();
  const tbl = document.getElementById('tbl');
  let rows = `<thead><tr><th>${t.thStage}</th><th class="r">${W1.name}</th><th class="r">${t.thConv}</th><th class="r">${W2.name}</th><th class="r">${t.thConv}</th></tr></thead><tbody>`;
  STAGE_KEYS.forEach((key, i) => {
    const p1 = i ? pct(W1[key], W1[STAGE_KEYS[i-1]]) : null;
    const p2 = i ? pct(W2[key], W2[STAGE_KEYS[i-1]]) : null;
    const b1 = p1 !== null && p1 > p2, b2 = p2 !== null && p2 > p1;
    rows += `<tr><td>${t.stages[key][0]}</td>
      <td class="r">${fmt(W1[key])}</td><td class="r ${b1?'better':''}">${p1===null?'–':pctS(W1[key], W1[STAGE_KEYS[i-1]])}</td>
      <td class="r">${fmt(W2[key])}</td><td class="r ${b2?'better':''}">${p2===null?'–':pctS(W2[key], W2[STAGE_KEYS[i-1]])}</td></tr>`;
  });
  rows += `<tr><td><b>${t.totalRevenue}</b></td><td class="r"><b>${fmtE(W1.revenue)}</b></td><td></td><td class="r better"><b>${fmtE(W2.revenue)}</b></td><td></td></tr></tbody>`;
  tbl.innerHTML = rows;
}

/* ================= Tooltip ================= */
const tip = document.getElementById('tooltip');
function attachTips(){
  document.querySelectorAll('[data-tip]').forEach(n => {
    if (n.dataset.tipBound) return;
    n.dataset.tipBound = '1';
    const show = e => {
      tip.innerHTML = n.dataset.tip;
      tip.style.display = 'block';
      const pad = 14;
      let x = e.clientX + pad, y = e.clientY + pad;
      const r = tip.getBoundingClientRect();
      if (x + r.width  > window.innerWidth  - 8) x = e.clientX - r.width  - pad;
      if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
      tip.style.left = x + 'px'; tip.style.top = y + 'px';
    };
    n.addEventListener('mousemove', show);
    n.addEventListener('click', show);
    n.addEventListener('mouseleave', () => tip.style.display = 'none');
  });
}
document.addEventListener('click', e => { if (!e.target.closest('[data-tip]')) tip.style.display = 'none'; });

function renderAll(){
  const t = T();
  setHtml('greeting', `${t.hello}, ${window._userName || ''} &#128075;`);
  kpiTiles(); bigchart(); feed(); events(); funnel(); table();
  renderPage(curPage);
}
